<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merge Tool</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SortableJS (CDN) for drag-and-drop reordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-indigo-100 selection:text-indigo-900">
    <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-slate-900 tracking-tight">PDF Merge Tool</h1>
            <p class="mt-3 text-lg text-slate-500 max-w-2xl mx-auto">Upload, reorder, and merge your PDF files instantly.</p>
        </header>
        
        <main class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 sm:p-10">
            <!-- Upload Area Section -->
            <section aria-labelledby="upload-heading">
                <h2 id="upload-heading" class="sr-only">Upload PDF Files</h2>
                <div id="drop-zone" class="border-2 border-dashed border-slate-300 bg-slate-50 rounded-2xl p-12 text-center transition-all duration-200 cursor-pointer flex flex-col items-center justify-center hover:bg-indigo-50 hover:border-indigo-400 group">
                    <div class="bg-white p-4 rounded-full shadow-sm mb-4 group-hover:shadow-md transition-shadow group-hover:scale-105 duration-200">
                        <svg class="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                    </div>
                    <p class="text-xl text-slate-700 font-semibold mb-2" id="drop-text">Drag PDFs here or browse</p>
                    <p class="text-sm text-slate-500 mb-6">Supported format: .pdf</p>
                    
                    <input type="file" id="file-input" multiple accept=".pdf" class="hidden">
                    
                    <button id="browse-btn" class="bg-white border text-indigo-600 border-indigo-200 px-6 py-2.5 rounded-xl shadow-sm hover:bg-indigo-50 focus:bg-indigo-50 font-semibold hover:border-indigo-300 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 active:bg-indigo-100 transition-all">
                        Browse Files
                    </button>
                </div>
            </section>

            <!-- File List Section -->
            <section aria-labelledby="files-heading" class="mt-10">
                <div class="flex justify-between items-end mb-5">
                    <div>
                        <h2 id="files-heading" class="text-xl font-bold text-slate-800">Selected Files</h2>
                        <p class="text-sm text-slate-500 mt-1">Drag rows to change the merge order.</p>
                    </div>
                    <span id="file-count" class="bg-indigo-50 border border-indigo-100 text-indigo-700 text-sm font-semibold px-3 py-1 rounded-full shadow-sm">0 files</span>
                </div>
                
                <div class="bg-slate-50 border border-slate-200 rounded-2xl overflow-hidden shadow-inner">
                    <ul id="file-list" class="divide-y divide-slate-100 min-h-[140px] flex flex-col">
                        <li id="empty-state" class="text-slate-400 text-center flex-1 flex flex-col items-center justify-center p-8">
                            <svg class="w-12 h-12 text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <span class="text-sm font-medium">No files selected yet</span>
                        </li>
                    </ul>
                </div>
            </section>

            <!-- Action Section -->
            <section aria-label="Merge Actions" class="mt-8 pt-6 flex flex-col items-center">
                <!-- Status Message container -->
                <div id="status-message" class="mb-5 text-center font-medium hidden rounded-xl px-5 py-3 w-full border text-sm" role="alert" aria-live="polite"></div>
                
                <button id="merge-btn" class="w-full bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-[0_8px_16px_rgba(79,70,229,0.25)] hover:shadow-[0_12px_20px_rgba(79,70,229,0.3)] hover:bg-indigo-700 hover:-translate-y-0.5 active:translate-y-0 font-bold text-lg focus:outline-none focus:ring-4 focus:ring-indigo-500/40 transition-all disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed disabled:hover:bg-indigo-600 disabled:hover:translate-y-0 flex items-center justify-center" disabled>
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    <span>Merge PDFs</span>
                </button>
            </section>
        </main>
    </div>

    <!-- Template for File List Items -->
    <template id="file-item-template">
        <li class="file-item bg-white flex items-center justify-between p-4 group cursor-move hover:bg-blue-50/30 transition-colors">
            <div class="flex items-center space-x-4 min-w-0 flex-1">
                <div class="text-slate-300 group-hover:text-indigo-400 p-1 rounded hover:bg-slate-100 transition-colors cursor-grab active:cursor-grabbing">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
                </div>
                <div class="bg-rose-50 border border-rose-100 p-2 rounded-lg shrink-0 text-rose-500 shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <div class="flex-1 min-w-0 pr-4">
                    <p class="file-name text-slate-700 font-semibold truncate text-sm"></p>
                </div>
            </div>
            <button class="remove-btn text-slate-400 hover:text-rose-600 hover:bg-rose-50 p-2 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-rose-500/40" title="Remove file" aria-label="Remove PDF file">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </li>
    </template>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
